<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <!-- ✅ 手机自适应（关键） -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>在线客服</title>

  <style>
    /* 页面整体样式 */
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC",
                   "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7fa, #e4ecf7);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 卡片容器 */
    .card {
      width: 92%;
      max-width: 420px;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      padding: 28px 22px;
      box-sizing: border-box;
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 22px;
      color: #222;
    }

    p {
      margin: 0 0 18px;
      font-size: 15px;
      color: #666;
    }

    /* 引导提示 */
    .tip {
      font-size: 14px;
      color: #888;
      margin-top: 20px;
    }

    /* 按钮（给没有自动弹窗的用户兜底） */
    .open-chat {
      display: inline-block;
      margin-top: 14px;
      padding: 12px 26px;
      font-size: 15px;
      color: #fff;
      background: #007bff;
      border-radius: 30px;
      text-decoration: none;
      box-shadow: 0 4px 12px rgba(0, 123, 255, 0.3);
      cursor: pointer;
    }

    /* 手机优化 */
    @media (max-width: 480px) {
      .card {
        padding: 24px 18px;
      }
      h1 {
        font-size: 20px;
      }
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>📩 在线客服</h1>
    <p>您好，欢迎咨询<br>请点击下方按钮或直接打开右下角聊天窗口</p>

    <!-- 兜底按钮（手动打开 Crisp） -->
    <div class="open-chat" onclick="window.$crisp.push(['do', 'chat:open'])">
      点此联系客服
    </div>

    <div class="tip">
      客服工作时间：9:00 - 21:00<br>
      通常几分钟内回复
    </div>
  </div>

  <!-- ✅ 你的 Crisp 代码（完全保留，不动） -->
  <script type="text/javascript">
    window.$crisp = [];
    window.CRISP_WEBSITE_ID = "740b947d-9cd5-46aa-8d89-41dc6f5359d8";
    (function () {
      var d = document;
      var s = d.createElement("script");
      s.src = "https://client.crisp.chat/l.js";
      s.async = 1;
      d.getElementsByTagName("head")[0].appendChild(s);
    })();
  </script>

</body>
</html>
